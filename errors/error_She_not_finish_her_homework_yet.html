<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>错题本</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC",sans-serif;background:linear-gradient(135deg,#ee6b6b 0%,#b91d73 100%);min-height:100vh;color:#333;padding:18px 14px 40px}
.wrap{max-width:560px;margin:0 auto}
.header{text-align:center;color:#fff;margin:6px 0 18px}
.header h1{font-size:22px;margin-bottom:4px}
.header .sub{font-size:13px;opacity:.9}
.card{background:#fff;border-radius:18px;padding:20px 18px;margin-bottom:16px;box-shadow:0 8px 24px rgba(0,0,0,.18)}
.card-tag{display:inline-block;font-size:12px;font-weight:700;color:#fff;background:linear-gradient(135deg,#ee6b6b,#b91d73);padding:4px 12px;border-radius:20px;margin-bottom:14px}
.card-tag.t2{background:linear-gradient(135deg,#fa709a,#fee140);color:#7a2438}
.card-tag.t3{background:linear-gradient(135deg,#f7971e,#ffd200);color:#5a4500}
.card-tag.t4{background:linear-gradient(135deg,#11998e,#38ef7d)}
.card-tag.t5{background:linear-gradient(135deg,#4facfe,#00f2fe)}

/* 题目 */
.q-type{display:inline-block;font-size:12px;color:#b91d73;background:#ffe8f1;border-radius:8px;padding:3px 10px;margin-bottom:10px;font-weight:600}
.q-text{font-size:18px;line-height:1.6;color:#234;white-space:pre-wrap}

/* 答案对比 */
.ans-row{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap}
.ans-box{flex:1;min-width:140px;border-radius:12px;padding:12px 14px}
.ans-box.wrong{background:#fff0f3;border:2px solid #ffc2cf}
.ans-box.right{background:#effaf3;border:2px solid #b8ebcd}
.ans-box .lab{font-size:12px;font-weight:700;margin-bottom:5px}
.ans-box.wrong .lab{color:#e84a6f}
.ans-box.right .lab{color:#11806a}
.ans-box .val{font-size:17px;font-weight:600;color:#333}

/* 错因/考点 文本 */
.para{font-size:15px;line-height:1.7;color:#444}
.para .hl{background:#fff3cd;border-radius:4px;padding:0 4px;color:#7a5a00;font-weight:600}
.kn-name{font-size:16px;font-weight:700;color:#11806a;margin-bottom:8px}

/* 练习 */
.pr{border:1px solid #d6ecff;border-radius:12px;padding:13px;margin-bottom:12px}
.pr-q{font-size:16px;color:#234;margin-bottom:10px;line-height:1.5;white-space:pre-wrap}
.pr-row{display:flex;gap:8px}
.pr-input{flex:1;padding:10px 12px;font-size:15px;border:2px solid #d6ecff;border-radius:10px;outline:none}
.pr-input:focus{border-color:#4facfe}
.pr-input.ok{border-color:#38ef7d;background:#effaf3}
.pr-input.no{border-color:#ff6b8a;background:#fff5f8}
.pr-btn{padding:10px 16px;border:none;border-radius:10px;background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;font-weight:700;cursor:pointer;font-size:14px}
.pr-fb{margin-top:9px;font-size:13px;min-height:18px}
.pr-fb.ok{color:#11998e}
.pr-fb.no{color:#e84a6f}
.pr-fb .ans{font-weight:700}
.footer{text-align:center;color:rgba(255,255,255,.8);font-size:12px;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
<h1>📕 错题本</h1>
<div class="sub">错一次，弄懂它，下次不再错</div>
</div>
<div id="app"></div>
<div class="footer">喵老师 AI 家教 · 错题拆解</div>
</div>

<script>
/* ===== 错题数据（英语喵分析后产出，填入这一个对象即可生成任意错题）===== */
var problem={
  "type": "语法填空",
  "question": "She ____ (not finish) her homework yet.",
  "yourAnswer": "didn't finish",
  "correctAnswer": "hasn't finished",
  "why": "句末的 yet（尚未）是现在完成时的标志词，表示\"到现在为止还没做完\"，所以要用 has/have not + 过去分词。你用了 didn't finish（一般过去时），那是在讲过去某个时间点的事，和 yet 搭不上。",
  "knowledge": "现在完成时 vs 一般过去时。看到 yet / already / just / ever / never / since / for 这些词，通常用现在完成时（has/have + 过去分词）。一般过去时讲的是过去某个明确时间发生、且已经结束的动作（常配 yesterday, last week, ago）。",
  "similar": [
    {
      "q": "I ____ (already eat) lunch.",
      "answer": "have already eaten",
      "hint": "already 是现在完成时标志词，主语 I 用 have"
    },
    {
      "q": "He ____ (not see) this movie yet.",
      "answer": "hasn't seen / has not seen",
      "hint": "yet + 第三人称单数 → hasn't + 过去分词"
    },
    {
      "q": "They ____ (live) here since 2019.",
      "answer": "have lived",
      "hint": "since 接时间点，用现在完成时"
    }
  ]
};

/* ===== 渲染 ===== */
function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}

function renderQuestion(p){
  var c=el("div","card");
  c.appendChild(el("div","card-tag","① 这道题"));
  if(p.type)c.appendChild(el("div","q-type",p.type));
  c.appendChild(el("div","q-text",p.question));
  return c;
}

function renderAnswers(p){
  var c=el("div","card");
  c.appendChild(el("div","card-tag t2","② 你的答案 vs 正确答案"));
  var row=el("div","ans-row");
  row.appendChild(el("div","ans-box wrong",'<div class="lab">✗ 你写的</div><div class="val">'+(p.yourAnswer||"(空)")+'</div>'));
  row.appendChild(el("div","ans-box right",'<div class="lab">✓ 正确答案</div><div class="val">'+p.correctAnswer+'</div>'));
  c.appendChild(row);
  return c;
}

function renderWhy(p){
  var c=el("div","card");
  c.appendChild(el("div","card-tag t3","③ 为什么错"));
  c.appendChild(el("div","para",p.why));
  return c;
}

function renderKnowledge(p){
  var c=el("div","card");
  c.appendChild(el("div","card-tag t4","④ 考点 · 记住这个"));
  c.appendChild(el("div","para",p.knowledge));
  return c;
}

function renderSimilar(p){
  var c=el("div","card");
  c.appendChild(el("div","card-tag t5","⑤ 同类练习 · 趁热打铁"));
  if(!p.similar||!p.similar.length){c.appendChild(el("div","para","（这道题暂无同类练习）"));return c;}
  for(var i=0;i<p.similar.length;i++){(function(pr){
    var box=el("div","pr");
    box.appendChild(el("div","pr-q",pr.q));
    var row=el("div","pr-row");
    var inp=el("input","pr-input");inp.type="text";inp.placeholder="写答案...";inp.setAttribute("autocomplete","off");
    var btn=el("button","pr-btn","检查");
    row.appendChild(inp);row.appendChild(btn);
    box.appendChild(row);
    var fb=el("div","pr-fb","");box.appendChild(fb);
    function check(){
      var val=inp.value.trim().toLowerCase().replace(/\s+/g," ");
      var answers=pr.answer.toLowerCase().split("/");var ok=false;
      for(var k=0;k<answers.length;k++){if(val===answers[k].trim()){ok=true;break;}}
      inp.classList.remove("ok","no");fb.className="pr-fb";
      if(ok){inp.classList.add("ok");fb.classList.add("ok");fb.innerHTML="✓ 答对了！";}
      else{inp.classList.add("no");fb.classList.add("no");fb.innerHTML='✗ 再想想。正确答案：<span class="ans">'+pr.answer+'</span>'+(pr.hint?'<br>💡 '+pr.hint:'');}
    }
    btn.addEventListener("click",check);
    inp.addEventListener("keydown",function(ev){if(ev.key==="Enter"){ev.preventDefault();check();}});
    c.appendChild(box);
  })(p.similar[i]);}
  return c;
}

function render(){
  var app=document.getElementById("app");
  app.innerHTML="";
  app.appendChild(renderQuestion(problem));
  app.appendChild(renderAnswers(problem));
  app.appendChild(renderWhy(problem));
  app.appendChild(renderKnowledge(problem));
  app.appendChild(renderSimilar(problem));
}
render();
</script>
</body>
</html>
