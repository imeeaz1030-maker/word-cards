<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>单词打卡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC",sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;color:#333;padding:18px 14px 100px}
.wrap{max-width:480px;margin:0 auto}
.header{text-align:center;color:#fff;margin:6px 0 18px}
.header h1{font-size:22px;margin-bottom:4px}
.header .sub{font-size:13px;opacity:.9}
.progress{font-size:13px;opacity:.9}
.tabs{display:flex;gap:6px;margin-bottom:16px;justify-content:center}
.tab{flex:1;max-width:160px;padding:10px;border-radius:30px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:.3s;color:#fff;background:rgba(255,255,255,.2)}
.tab.active{background:#fff;color:#667eea;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.card{background:#fff;border-radius:24px;padding:28px 22px;margin-bottom:16px;box-shadow:0 10px 30px rgba(0,0,0,.18);transition:.3s;cursor:pointer;position:relative;min-height:200px;display:flex;flex-direction:column;justify-content:center;align-items:center;perspective:1000px}
.card-inner{width:100%;transition:.5s;transform-style:preserve-3d;position:relative}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card-front,.card-back{backface-visibility:hidden;width:100%}
.card-back{position:absolute;top:0;left:0;transform:rotateY(180deg)}
.card .word{font-size:28px;font-weight:700;color:#222;margin-bottom:8px;text-align:center}
.card .phonetic{font-size:15px;color:#888;margin-bottom:6px;text-align:center}
.card .pos{font-size:13px;color:#667eea;font-weight:600;display:inline-block;margin-bottom:4px}
.card .meaning{font-size:22px;color:#333;margin:10px 0 6px;text-align:center}
.card .example{font-size:14px;color:#999;font-style:italic;text-align:center;margin-top:8px;line-height:1.5}
.card .hint{font-size:13px;color:#bbb;text-align:center;margin-top:14px}
.nav{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.nav button{padding:10px 18px;border:none;border-radius:30px;font-size:14px;cursor:pointer;transition:.3s;color:#fff;font-weight:600;background:rgba(255,255,255,.2)}
.nav button:hover{background:rgba(255,255,255,.35)}
.nav button:active{transform:scale(.95)}
.spell-card{background:#fff;border-radius:24px;padding:24px 20px;box-shadow:0 10px 30px rgba(0,0,0,.18);margin-bottom:16px}
.spell-card .prompt{font-size:16px;color:#888;margin-bottom:8px}
.spell-card .scard-word{font-size:26px;font-weight:700;color:#222;margin-bottom:4px}
.spell-card .scard-meaning{font-size:22px;color:#333;margin-bottom:12px;text-align:center}
.spell-card .scard-extra{font-size:15px;color:#888;margin-bottom:14px;text-align:center}
.spell-card .input-row{display:flex;gap:8px;margin-bottom:10px}
.spell-card input{flex:1;padding:14px 16px;border:2px solid #ddd;border-radius:16px;font-size:17px;outline:none;transition:.3s}
.spell-card input:focus{border-color:#667eea}
.spell-card input.correct{border-color:#38ef7d;background:#f0fff4}
.spell-card input.wrong{border-color:#ff6b6b;background:#fff5f5}
.spell-card .spell-feedback{text-align:center;font-size:15px;min-height:28px;margin-top:4px}
.spell-card .spell-feedback.correct{color:#11998e}
.spell-card .spell-feedback.wrong{color:#e74c3c}
.spell-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.spell-actions button{flex:1;min-width:80px;padding:12px;border:none;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;transition:.3s;color:#fff}
.spell-actions button:active{transform:scale(.95)}
.btn-submit{background:linear-gradient(135deg,#667eea,#764ba2)}
.btn-skip{background:linear-gradient(135deg,#f7971e,#ffd200);color:#5a4500!important}
.btn-next{background:linear-gradient(135deg,#11998e,#38ef7d)}
.btn-speak{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.btn-review{background:linear-gradient(135deg,#fa709a,#fee140);color:#7a2438!important}
.stats{display:flex;gap:16px;justify-content:center;margin-bottom:18px;color:#fff;font-size:13px}
.stats span{background:rgba(255,255,255,.15);padding:6px 14px;border-radius:20px}
.speak-btn{position:absolute;top:12px;right:16px;background:none;border:none;font-size:24px;cursor:pointer;color:#667eea;z-index:5;padding:4px 8px;border-radius:12px}
.speak-btn:hover{background:rgba(102,126,234,.1)}
.speak-btn:active{transform:scale(.9)}
.fav-btn{position:absolute;top:12px;left:16px;background:none;border:none;font-size:22px;cursor:pointer;z-index:5;padding:4px 8px;border-radius:12px;transition:.3s}
.fav-btn:hover{transform:scale(1.2)}
.fav-btn.active{animation:heartBeat .4s}
@keyframes heartBeat{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.review-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px;color:#fff;font-size:12px;margin-bottom:12px}
.review-badge .num{font-weight:700;font-size:16px}
.footer-nav{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.footer-nav button{padding:8px 16px;border:none;border-radius:20px;font-size:13px;cursor:pointer;transition:.3s;color:#fff;background:rgba(255,255,255,.15)}
.footer-nav button:active{transform:scale(.95)}
.mode-indicator{text-align:center;color:#fff;font-size:13px;margin-bottom:8px;padding:6px;border-radius:12px;background:rgba(255,255,255,.12)}
.resume-bar{text-align:center;color:#fff;font-size:13px;margin-bottom:10px;padding:8px 12px;border-radius:16px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:.3s}
.resume-bar:hover{background:rgba(255,255,255,.25)}
.resume-bar .resume-btn{background:#fff;border:none;border-radius:20px;padding:4px 14px;font-size:13px;font-weight:700;color:#667eea;cursor:pointer}
#spellCard{display:none}
#spellCard.active{display:block}
#browseCard,#spellCard,#reviewCard{transition:.3s}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
<h1>单词打卡</h1>
<div class="sub" id="cardTitle">112 个不规则动词过去式</div>
<div class="progress" id="progressInfo">第 <span id="cur">1</span> / <span id="tot">112</span> 个</div>
</div>

<div id="resumeBar" class="resume-bar" style="display:none" onclick="jumpToSaved()">
  📍 上次学到 <span id="resumeWord"></span>
  <span class="resume-btn">继续 ›</span>
</div>

<div class="tabs">
<button class="tab active" id="tabBrowse" onclick="switchTab('browse')">👀 浏览</button>
<button class="tab" id="tabSpell" onclick="switchTab('spell')">✍️ 拼写</button>
</div>

<div class="stats">
<span>已答对: <strong id="sCorrect">0</strong></span>
<span>共答: <strong id="sTotal">0</strong></span>
<span>错词: <strong id="sWrong">0</strong></span>
</div>

<div id="browseCard">
<div class="card" id="card" onclick="flip()">
<button class="speak-btn" onclick="event.stopPropagation();speak(words[idx]?.['word']||'')" title="发音">♪</button>
<button class="fav-btn" id="favBtn" onclick="toggleFav(event)" title="收藏">♡</button>
<div class="card-inner">
<div class="card-front">
<div class="word" id="word">was / were</div>
<div class="phonetic" id="phonetic">/wʌz/ /wɜːr/</div>
<div class="pos" id="pos">v.</div>
<div class="hint">👆 点击翻转看释义</div>
</div>
<div class="card-back">
<div class="meaning" id="meaning">是（be的过去式）</div>
<div class="pos" id="pos2">v.</div>
<div class="example" id="example">I was happy yesterday.</div>
<button class="speak-btn" style="position:static;margin-top:10px;font-size:18px" onclick="event.stopPropagation();speak(words[idx]?.example||'')">🔊 读例句</button>
</div>
</div>
</div>
<div class="nav">
<button onclick="prev()">◀ 上一个</button>
<button onclick="rand()">🎲 随机</button>
<button onclick="next()">下一个 ▶</button>
</div>
<div class="footer-nav">
<button onclick="resetAll()">🔄 重置进度</button>
</div>
</div>

<div id="spellCard" class="active">
<div class="mode-indicator" id="modeIndicator">✍️ 拼写模式</div>
<div class="spell-card">
<div class="scard-meaning" id="sMeaning">是（be的过去式）</div>
<div class="scard-extra" id="sPhonetic">/wʌz/ /wɜːr/</div>
<div class="scard-extra" id="sPos">v.</div>
<div class="input-row">
<input type="text" id="spellInput" placeholder="输入英语..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
</div>
<div class="spell-feedback" id="sFeedback"></div>
<div class="spell-actions">
<button class="btn-submit" onclick="submitSpell()">✓ 提交</button>
<button class="btn-speak" onclick="speak(words[spellIdx]?.meaning||'')">🔊 听中文</button>
</div>
<div class="spell-actions" style="margin-top:6px">
<button class="btn-skip" onclick="skipSpell()">⏭ 跳过</button>
<button class="btn-next" onclick="spellNext()" id="btnNextWord">➡ 下一词</button>
</div>
<div class="spell-actions" style="margin-top:8px">
<button class="btn-review" onclick="enterReviewMode()" id="btnReview">📕 错词专项 (<span id="reviewCount">0</span>)</button>
<button class="btn-review" onclick="exitReviewMode()" id="btnExitReview" style="display:none">🔙 退出错词</button>
</div>
<div class="spell-actions">
<button class="btn-review" onclick="enterReviewedMode()" id="btnReviewed">✅ 已复习专练 (<span id="reviewedCount">0</span>)</button>
<button class="btn-review" onclick="exitReviewedMode()" id="btnExitReviewed" style="display:none">🔙 退出已复习</button>
</div>
</div>
</div>
</div>

<script>

": "/tɔːt/", "pos": "v.", "meaning": "教（teach的过去式）", "example": "My teacher taught me English."}, {"word": "tore", "phonetic": "/tɔːr/", "pos": "v.", "meaning": "撕裂（tear的过去式）", "example": "I tore the paper by mistake."}, {"word": "told", "phonetic": "/toʊld/", "pos": "v.", "meaning": "告诉（tell的过去式）", "example": "I told my mum the truth."}, {"word": "thought", "phonetic": "/θɔːt/", "pos": "v.", "meaning": "思考（think的过去式）", "example": "I thought about the problem."}, {"word": "threw", "phonetic": "/θruː/", "pos": "v.", "meaning": "投/扔（throw的过去式）", "example": "I threw the ball."}, {"word": "understood", "phonetic": "/ˌʌndərˈstʊd/", "pos": "v.", "meaning": "了解（understand的过去式）", "example": "I understood the question."}, {"word": "woke / waked", "phonetic": "/woʊk/ /weɪkt/", "pos": "v.", "meaning": "醒着（wake的过去式）", "example": "I woke up at 7 o'clock."}, {"word": "wore", "phonetic": "/wɔːr/", "pos": "v.", "meaning": "穿着（wear的过去式）", "example": "I wore a red dress."}, {"word": "wet / wetted", "phonetic": "/wɛt/ /ˈwɛtɪd/", "pos": "v.", "meaning": "淋湿（过去式）", "example": "The rain wet my clothes."}, {"word": "won", "phonetic": "/wʌn/", "pos": "v.", "meaning": "获胜（win的过去式）", "example": "Our team won the game."}, {"word": "wrote", "phonetic": "/roʊt/", "pos": "v.", "meaning": "书写（write的过去式）", "example": "I wrote a letter."}];
var idx=0;
var spellIdx=0;
var spellCorrect=0;
var spellTotal=0;
var spellAnswered=false;
var wrongQueue=[];
var reviewedQueue=[];
var reviewMode=false;
var reviewedMode=false;

// 从 localStorage 恢复全部状态
(function(){
try{wrongQueue=JSON.parse(localStorage.getItem(WRONG_STORE))||[];}catch(e){wrongQueue=[];}
try{reviewedQueue=JSON.parse(localStorage.getItem(REVIEWED_STORE))||[];}catch(e){reviewedQueue=[];}
try{
  var savedIdx=parseInt(localStorage.getItem(CUR_IDX_KEY));
  if(!isNaN(savedIdx)&&savedIdx>=0) idx=savedIdx;
}catch(e){}
try{
  var savedSpell=parseInt(localStorage.getItem(SPELL_IDX_KEY));
  if(!isNaN(savedSpell)&&savedSpell>=0) spellIdx=savedSpell;
}catch(e){}
})();

function saveIndex(){
  try{localStorage.setItem(CUR_IDX_KEY,String(idx));}catch(e){}
  try{localStorage.setItem(SPELL_IDX_KEY,String(spellIdx));}catch(e){}
}
function saveQueues(){
  localStorage.setItem(WRONG_STORE,JSON.stringify(wrongQueue));
  localStorage.setItem(REVIEWED_STORE,JSON.stringify(reviewedQueue));
}

function switchTab(tab){
  document.getElementById("tabBrowse").classList.toggle("active",tab==="browse");
  document.getElementById("tabSpell").classList.toggle("active",tab==="spell");
  document.getElementById("browseCard").style.display=tab==="browse"?"block":"none";
  document.getElementById("spellCard").style.display=tab==="spell"?"block":"none";
}

// ===== 浏览模式 =====
function load(){
  var w=words[idx];
  document.getElementById("word").textContent=w.word;
  document.getElementById("phonetic").textContent=w.phonetic;
  document.getElementById("pos").textContent=w.pos;
  document.getElementById("pos2").textContent=w.pos;
  document.getElementById("meaning").textContent=w.meaning;
  document.getElementById("example").textContent=w.example;
  document.getElementById("cur").textContent=idx+1;
  document.getElementById("card").classList.remove("flipped");
  updateFav();
  saveIndex();
  // 显示断点条
  updateResumeBar();
}
function flip(){document.getElementById("card").classList.toggle("flipped");}
function next(){idx=(idx+1)%words.length;load();}
function prev(){idx=(idx-1+words.length)%words.length;load();}
function rand(){var n;do{n=Math.floor(Math.random()*words.length);}while(n===idx&&words.length>1);idx=n;load();}

function updateResumeBar(){
  var bar=document.getElementById("resumeBar");
  if(idx>0){
    bar.style.display="flex";
    document.getElementById("resumeWord").textContent="第 "+idx+" 个 · "+(words[idx]?.word||"");
  }else{
    bar.style.display="none";
  }
}
function jumpToSaved(){
  // 已经通过 restore 在 idx 上了，直接加载
  load();
  window.scrollTo({top:0,behavior:"smooth"});
}

// ===== 拼写模式 =====
function updateStats(){
  document.getElementById("sCorrect").textContent=spellCorrect;
  document.getElementById("sTotal").textContent=spellTotal;
  document.getElementById("sWrong").textContent=wrongQueue.length;
  document.getElementById("reviewCount").textContent=wrongQueue.length;
  document.getElementById("reviewedCount").textContent=reviewedQueue.length;
  document.getElementById("btnReview").disabled=wrongQueue.length===0;
  document.getElementById("btnReviewed").disabled=reviewedQueue.length===0;
}
function loadSpell(){
  var w=words[spellIdx];
  document.getElementById("sMeaning").textContent=w.meaning;
  document.getElementById("sPos").textContent=w.pos;
  document.getElementById("sPhonetic").textContent=w.phonetic;
  var inp=document.getElementById("spellInput");
  inp.value="";inp.classList.remove("correct","wrong");inp.disabled=false;
  document.getElementById("sFeedback").textContent="";
  document.getElementById("sFeedback").className="spell-feedback";
  updateStats();spellAnswered=false;
  setTimeout(function(){inp.focus();},100);
  saveIndex();
}
function submitSpell(){
  if(spellAnswered)return;
  var inp=document.getElementById("spellInput");
  var ans=inp.value.trim().toLowerCase();
  var correct=words[spellIdx].word.toLowerCase();
  var fb=document.getElementById("sFeedback");
  spellTotal++;
  if(ans===correct){
    spellCorrect++;inp.classList.add("correct");inp.disabled=true;
    fb.textContent="✓ 答对了!";fb.className="spell-feedback correct";
    spellAnswered=true;speak(words[spellIdx].word);
    if(reviewedMode){
      // 已复习专练: 不处理
    }else if(reviewMode){
      var wIdx=wrongQueue.indexOf(spellIdx);if(wIdx>=0)wrongQueue.splice(wIdx,1);
      if(reviewedQueue.indexOf(spellIdx)<0)reviewedQueue.push(spellIdx);saveQueues();
      if(wrongQueue.length===0){setTimeout(function(){alert("恭喜! 错词全部掌握!");exitReviewMode();},1500);return;}
    }else{
      if(wrongQueue.indexOf(spellIdx)<0){if(reviewedQueue.indexOf(spellIdx)<0)reviewedQueue.push(spellIdx);saveQueues();}
    }
    setTimeout(function(){spellNext();},1500);
  }else{
    inp.classList.add("wrong");
    fb.innerHTML="✗ 拼错了, 应该是 <strong>"+words[spellIdx].word+"</strong><br>你写的: "+(ans||"(空)");
    fb.className="spell-feedback wrong";spellAnswered=true;speak(words[spellIdx].word);
    if(!reviewedMode){
      if(wrongQueue.indexOf(spellIdx)<0)wrongQueue.push(spellIdx);
      var rIdx=reviewedQueue.indexOf(spellIdx);if(rIdx>=0)reviewedQueue.splice(rIdx,1);saveQueues();
    }
  }
  updateStats();
}
function skipSpell(){
  if(spellAnswered)return;
  var fb=document.getElementById("sFeedback");
  fb.innerHTML="答案是 <strong>"+words[spellIdx].word+"</strong>";
  fb.className="spell-feedback wrong";spellTotal++;spellAnswered=true;
  document.getElementById("spellInput").disabled=true;
  if(!reviewedMode){
    if(wrongQueue.indexOf(spellIdx)<0)wrongQueue.push(spellIdx);
    var rIdx=reviewedQueue.indexOf(spellIdx);if(rIdx>=0)reviewedQueue.splice(rIdx,1);saveQueues();
  }
  updateStats();speak(words[spellIdx].word);
}
function spellNext(){
  if(reviewedMode){
    if(reviewedQueue.length===0){alert("已复习单词练完啦!");exitReviewedMode();return;}
    var randIdx=Math.floor(Math.random()*reviewedQueue.length);spellIdx=reviewedQueue[randIdx];
  }else if(reviewMode){
    if(wrongQueue.length===0){alert("恭喜! 错词全部掌握!");exitReviewMode();return;}
    var randIdx=Math.floor(Math.random()*wrongQueue.length);spellIdx=wrongQueue[randIdx];
  }else{
    spellIdx=(spellIdx+1)%words.length;
  }
  loadSpell();
}
function enterReviewMode(){
  if(wrongQueue.length===0){alert("还没有错词哦, 先答错几个再来吧!");return;}
  reviewMode=true;
  document.getElementById("modeIndicator").textContent="📕 错词专项复习";
  document.getElementById("spellCard").classList.add("review-mode");
  document.getElementById("btnReview").style.display="none";
  document.getElementById("btnExitReview").style.display="block";
  document.getElementById("btnReviewed").style.display="none";
  document.getElementById("btnExitReviewed").style.display="none";
  document.getElementById("progressInfo").innerHTML="<strong>错词专项 · 待掌握 "+wrongQueue.length+" 个</strong>";
  var randIdx=Math.floor(Math.random()*wrongQueue.length);spellIdx=wrongQueue[randIdx];loadSpell();
}
function exitReviewMode(){
  reviewMode=false;
  document.getElementById("modeIndicator").textContent="✍️ 拼写模式";
  document.getElementById("spellCard").classList.remove("review-mode");
  document.getElementById("btnReview").style.display="block";
  document.getElementById("btnExitReview").style.display="none";
  document.getElementById("btnReviewed").style.display="block";
  document.getElementById("btnExitReviewed").style.display="none";
  document.getElementById("progressInfo").innerHTML='第 <span id="cur">1</span> / <span id="tot">'+words.length+'</span> 个';
  spellIdx=idx;loadSpell();
}
function enterReviewedMode(){
  if(reviewedQueue.length===0){alert("还没有已复习单词哦, 先答对几个再来吧!");return;}
  reviewedMode=true;
  document.getElementById("modeIndicator").textContent="✅ 已复习专练";
  document.getElementById("spellCard").classList.add("reviewed-mode");
  document.getElementById("btnReviewed").style.display="none";
  document.getElementById("btnExitReviewed").style.display="block";
  document.getElementById("btnReview").style.display="none";
  document.getElementById("btnExitReview").style.display="none";
  document.getElementById("progressInfo").innerHTML="<strong>已复习专练 · "+reviewedQueue.length+" 个</strong>";
  var randIdx=Math.floor(Math.random()*reviewedQueue.length);spellIdx=reviewedQueue[randIdx];loadSpell();
}
function exitReviewedMode(){
  reviewedMode=false;
  document.getElementById("modeIndicator").textContent="✍️ 拼写模式";
  document.getElementById("spellCard").classList.remove("reviewed-mode");
  document.getElementById("btnReviewed").style.display="block";
  document.getElementById("btnExitReviewed").style.display="none";
  document.getElementById("btnReview").style.display="block";
  document.getElementById("btnExitReview").style.display="none";
  document.getElementById("progressInfo").innerHTML='第 <span id="cur">1</span> / <span id="tot">'+words.length+'</span> 个';
  spellIdx=idx;loadSpell();
}

// ===== 收藏 =====
function getFavs(){try{return JSON.parse(localStorage.getItem(FAV_KEY))||[];}catch(e){return [];}}
function saveFavs(f){localStorage.setItem(FAV_KEY,JSON.stringify(f));}
function toggleFav(e){
  e.stopPropagation();
  var favs=getFavs();var w=words[idx];var i=-1;
  for(var k=0;k<favs.length;k++){if(favs[k].word===w.word){i=k;break;}}
  if(i>=0){favs.splice(i,1);}else{favs.push(w);}
  saveFavs(favs);updateFav();
}
function updateFav(){
  var w=words[idx];var favs=getFavs();var found=false;
  for(var k=0;k<favs.length;k++){if(favs[k].word===w.word){found=true;break;}}
  document.getElementById("favBtn").textContent=found?"❤️":"♡";
}

// ===== 发音 =====
function speak(text){
  if(!text)return;
  try{
    var fname=text.replace(/\//g,'').replace(/'/g,'').replace(/[()]/g,'').replace(/&/g,'and').replace(/\s+/g,'_').replace(/_+/g,'_')+'.mp3';
    var a=new Audio('audio/'+fname);a.volume=1;a.play();
  }catch(e){
    try{var u=new SpeechSynthesisUtterance(text);u.lang='en-US';speechSynthesis.speak(u);}catch(e2){}
  }
}

// ===== 重置 =====
function resetAll(){
  if(!confirm("确定要清除所有进度（错词/已复习/当前位置）吗？"))return;
  localStorage.removeItem(WRONG_STORE);
  localStorage.removeItem(REVIEWED_STORE);
  localStorage.removeItem(FAV_KEY);
  localStorage.removeItem(CUR_IDX_KEY);
  localStorage.removeItem(SPELL_IDX_KEY);
  wrongQueue=[];reviewedQueue=[];idx=0;spellIdx=0;spellCorrect=0;spellTotal=0;
  load();loadSpell();
  document.getElementById("resumeBar").style.display="none";
}
