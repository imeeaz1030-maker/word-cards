<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单词打卡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC",sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;color:#fff}
.header{text-align:center;margin-bottom:15px;margin-top:10px}
.header h1{font-size:22px;margin-bottom:6px}
.progress{font-size:13px;opacity:.9}
.tabs{display:flex;gap:0;background:rgba(255,255,255,.15);border-radius:30px;padding:4px;margin-bottom:15px}
.tab{padding:10px 25px;border:none;background:transparent;color:#fff;cursor:pointer;font-size:14px;font-weight:600;border-radius:25px;transition:all .2s}
.tab.active{background:#fff;color:#667eea}
.mode{display:none;width:100%;max-width:420px;flex-direction:column;align-items:center}
.mode.active{display:flex}
.card-container{perspective:1000px;width:100%;height:280px;margin:10px 0}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .6s;cursor:pointer}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:20px;background:#fff;color:#333;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;box-shadow:0 10px 30px rgba(0,0,0,.3);text-align:center}
.card-back{transform:rotateY(180deg);background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);color:#fff}
.word{font-size:42px;font-weight:bold;margin-bottom:12px}
.phonetic{font-size:18px;color:#888;margin-bottom:15px}
.card-back .phonetic{color:rgba(255,255,255,.85)}
.pos{font-size:14px;color:#999;margin-bottom:8px}
.card-back .pos{color:rgba(255,255,255,.8)}
.meaning{font-size:28px;font-weight:600;margin-bottom:15px}
.example{font-size:14px;line-height:1.5;padding:0 10px;opacity:.95}
.hint{position:absolute;bottom:12px;font-size:11px;opacity:.5}
.fav-btn{position:absolute;top:15px;right:15px;background:none;border:none;font-size:32px;cursor:pointer;z-index:10;color:#bbb;line-height:1}
.fav-btn.on{color:#ff4757}
.speak-btn{position:absolute;top:15px;left:15px;background:#667eea;border:none;width:38px;height:38px;border-radius:50%;cursor:pointer;z-index:10;font-size:18px;color:#fff;display:flex;align-items:center;justify-content:center}
.card-back .speak-btn{background:rgba(255,255,255,.3)}
.controls{display:flex;gap:10px;margin:15px 0 10px 0;flex-wrap:wrap;justify-content:center}
.btn{padding:12px 22px;border:none;border-radius:25px;font-size:14px;font-weight:600;cursor:pointer;background:#fff;color:#667eea;box-shadow:0 4px 15px rgba(0,0,0,.15);min-width:80px}
.btn-pri{background:linear-gradient(135deg,#ffd89b,#19547b);color:#fff}
.btn-success{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#fff}
.btn-warning{background:linear-gradient(135deg,#fa709a,#fee140);color:#fff;width:100%;margin-top:10px}
.btn-danger{background:#ff4757;color:#fff}
.view-fav{margin-top:15px;background:rgba(255,255,255,.2);color:#fff;border:2px solid rgba(255,255,255,.5)}
.spell-card{background:#fff;color:#333;border-radius:20px;padding:30px 25px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.3);text-align:center;margin-bottom:15px;position:relative}
.spell-card.review-mode{background:linear-gradient(135deg,#fff5f5,#ffe8eb);border:2px solid #ff4757}
.spell-speak{position:absolute;top:15px;right:15px;background:#667eea;border:none;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:18px;color:#fff;display:flex;align-items:center;justify-content:center}
.review-badge{position:absolute;top:15px;left:15px;background:#ff4757;color:#fff;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;display:none}
.spell-card.review-mode .review-badge{display:block}
.spell-meaning{font-size:32px;font-weight:bold;color:#333;margin-bottom:8px}
.spell-pos{font-size:14px;color:#999;margin-bottom:10px}
.spell-phonetic{font-size:16px;color:#888;margin-bottom:20px}
.spell-prompt{font-size:14px;color:#666;margin-bottom:12px}
.spell-input{width:100%;padding:14px 18px;font-size:20px;border:2px solid #e0e0e0;border-radius:12px;outline:none;text-align:center;letter-spacing:1px}
.spell-input:focus{border-color:#667eea}
.spell-input.correct{border-color:#43e97b;background:#e8f9ee}
.spell-input.wrong{border-color:#ff4757;background:#ffe8eb}
.spell-feedback{margin-top:15px;font-size:15px;min-height:24px;font-weight:600}
.spell-feedback.correct{color:#43e97b}
.spell-feedback.wrong{color:#ff4757}
.spell-stats{margin-top:12px;font-size:13px;color:#888}
.spell-stats .wrong-count{color:#ff4757;font-weight:600}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:20px;padding:25px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;color:#333}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:2px solid #f0f0f0;padding-bottom:12px}
.modal-header h2{font-size:18px}
.close-btn{background:none;border:none;font-size:24px;cursor:pointer;color:#999}
.fav-list{list-style:none}
.fav-item{display:flex;justify-content:space-between;align-items:center;padding:12px 8px;border-bottom:1px solid #f0f0f0}
.fav-word strong{display:block;font-size:16px;color:#333}
.fav-word span{font-size:13px;color:#666}
.remove-btn{background:#ff4757;color:#fff;border:none;padding:6px 12px;border-radius:15px;font-size:12px;cursor:pointer}
.empty-state{text-align:center;padding:30px;color:#999}
.footer{margin-top:15px;font-size:12px;opacity:.7;text-align:center}
.btn-reviewed{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#fff;width:100%;margin-top:10px}
.spell-card.reviewed-mode{background:linear-gradient(135deg,#f0fff4,#e8f9ee);border:2px solid #43e97b}
.reviewed-badge{position:absolute;top:15px;left:15px;background:#43e97b;color:#fff;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;display:none}
.spell-card.reviewed-mode .reviewed-badge{display:block}
</style>
</head>
<body>
<div class="header">
<h1>单词打卡</h1>
<div class="progress" id="progressInfo">第 <span id="cur">1</span> / <span id="tot">8</span> 个</div>
</div>
<div class="tabs">
<button class="tab active" id="tabBrowse">浏览模式</button>
<button class="tab" id="tabSpell">拼写模式</button>
</div>

<div class="mode active" id="modeBrowse">
<div class="card-container">
<div class="card" id="card">
<div class="card-face card-front">
<button class="speak-btn" id="speakBtn1">♪</button>
<button class="fav-btn" id="favBtn">♡</button>
<div class="word" id="word">apple</div>
<div class="phonetic" id="phonetic">/aepl/</div>
<div class="pos" id="pos">n.</div>
<div class="hint">点击翻转</div>
</div>
<div class="card-face card-back">
<button class="speak-btn" id="speakBtn2">♪</button>
<div class="pos" id="pos2">n.</div>
<div class="meaning" id="meaning">苹果</div>
<div class="example" id="example">An apple a day keeps the doctor away.</div>
<div class="hint">点击翻回</div>
</div>
</div>
</div>
<div class="controls">
<button class="btn" id="btnPrev">上一个</button>
<button class="btn btn-pri" id="btnRandom">随机</button>
<button class="btn" id="btnNext">下一个</button>
</div>
</div>

<div class="mode" id="modeSpell">
<div class="spell-card" id="spellCard">
<div class="review-badge">错词专项</div>
<div class="reviewed-badge">已复习专练</div>
<button class="spell-speak" id="spellSpeakBtn">♪</button>
<div class="spell-meaning" id="sMeaning">苹果</div>
<div class="spell-pos" id="sPos">n.</div>
<div class="spell-phonetic" id="sPhonetic">/aepl/</div>
<div class="spell-prompt">请拼写这个单词(点♪听发音)</div>
<input type="text" class="spell-input" id="spellInput" placeholder="输入单词..." autocomplete="off" autocapitalize="off" spellcheck="false">
<div class="spell-feedback" id="sFeedback"></div>
<div class="spell-stats" id="spellStats">已答对 <span id="sCorrect">0</span> / 共 <span id="sTotal">0</span> · <span class="wrong-count">错词 <span id="sWrong">0</span></span></div>
</div>
<div class="controls">
<button class="btn btn-success" id="btnSubmit">提交</button>
<button class="btn" id="btnSkip">跳过</button>
<button class="btn btn-pri" id="btnSpellNext">下一个</button>
</div>
<button class="btn btn-warning" id="btnReview">错词专项练习 (<span id="reviewCount">0</span>)</button>
<button class="btn btn-warning" id="btnExitReview" style="display:none">退出错词专项</button>
<button class="btn btn-reviewed" id="btnReviewed">已复习单词 (<span id="reviewedCount">0</span>)</button>
<button class="btn btn-reviewed" id="btnExitReviewed" style="display:none">退出已复习专练</button>
</div>

<button class="btn view-fav" id="btnViewFav">查看生词本 (<span id="favCount">0</span>)</button>
<div class="footer">喵老师 AI 家教</div>

<div class="modal" id="modal">
<div class="modal-content">
<div class="modal-header">
<h2>我的生词本</h2>
<button class="close-btn" id="btnClose">x</button>
</div>
<ul class="fav-list" id="favList"></ul>
</div>
</div>

var idx=0;
var spellIdx=0;
var spellCorrect=0;
var spellTotal=0;
var spellAnswered=false;
var wrongQueue=[];
var reviewedQueue=[];
var reviewMode=false;
var reviewedMode=false;

// 从 localStorage 恢复队列
(function(){try{wrongQueue=JSON.parse(localStorage.getItem(WRONG_STORE))||[];}catch(e){wrongQueue=[];}try{reviewedQueue=JSON.parse(localStorage.getItem(REVIEWED_STORE))||[];}catch(e){reviewedQueue=[];}})();

function saveQueues(){localStorage.setItem(WRONG_STORE,JSON.stringify(wrongQueue));localStorage.setItem(REVIEWED_STORE,JSON.stringify(reviewedQueue));}

document.getElementById("tot").textContent=words.length;

function speak(text){try{var fname=text.replace(/\//g,'').replace(/'/g,'').replace(/[()]/g,'').replace(/&/g,'and').replace(/\s+/g,'_').replace(/_+/g,'_')+'.mp3';var a=new Audio('audio/'+fname);a.volume=1;a.play();}catch(e){try{var u=new SpeechSynthesisUtterance(text);u.lang='en-US';speechSynthesis.speak(u);}catch(e2){}}}

function load(){var w=words[idx];document.getElementById("word").textContent=w.word;document.getElementById("phonetic").textContent=w.phonetic;document.getElementById("pos").textContent=w.pos;document.getElementById("pos2").textContent=w.pos;document.getElementById("meaning").textContent=w.meaning;document.getElementById("example").textContent=w.example;document.getElementById("cur").textContent=idx+1;document.getElementById("card").classList.remove("flipped");updateFav();}
function flip(){document.getElementById("card").classList.toggle("flipped");}
function next(){idx=(idx+1)%words.length;load();}
function prev(){idx=(idx-1+words.length)%words.length;load();}
function rand(){var n;do{n=Math.floor(Math.random()*words.length);}while(n===idx&&words.length>1);idx=n;load();}

function updateStats(){document.getElementById("sCorrect").textContent=spellCorrect;document.getElementById("sTotal").textContent=spellTotal;document.getElementById("sWrong").textContent=wrongQueue.length;document.getElementById("reviewCount").textContent=wrongQueue.length;document.getElementById("reviewedCount").textContent=reviewedQueue.length;document.getElementById("btnReview").disabled=wrongQueue.length===0;document.getElementById("btnReviewed").disabled=reviewedQueue.length===0;}

function loadSpell(){var w=words[spellIdx];document.getElementById("sMeaning").textContent=w.meaning;document.getElementById("sPos").textContent=w.pos;document.getElementById("sPhonetic").textContent=w.phonetic;var inp=document.getElementById("spellInput");inp.value="";inp.classList.remove("correct","wrong");inp.disabled=false;document.getElementById("sFeedback").textContent="";document.getElementById("sFeedback").className="spell-feedback";updateStats();spellAnswered=false;setTimeout(function(){inp.focus();},100);}

function submitSpell(){if(spellAnswered)return;var inp=document.getElementById("spellInput");var ans=inp.value.trim().toLowerCase();var correct=words[spellIdx].word.toLowerCase();var fb=document.getElementById("sFeedback");spellTotal++;if(ans===correct){spellCorrect++;inp.classList.add("correct");inp.disabled=true;fb.textContent="✓ 答对了!";fb.className="spell-feedback correct";spellAnswered=true;speak(words[spellIdx].word);
if(reviewedMode){
// 已复习专练: 答对不做额外处理
}else if(reviewMode){
// 错词专项: 答对 → 移出错词, 加入已复习
var wIdx=wrongQueue.indexOf(spellIdx);if(wIdx>=0)wrongQueue.splice(wIdx,1);if(reviewedQueue.indexOf(spellIdx)<0)reviewedQueue.push(spellIdx);saveQueues();
if(wrongQueue.length===0){setTimeout(function(){alert("恭喜! 错词全部掌握!");exitReviewMode();},1500);return;}
}else{
// 普通模式: 答对 且 不在错词队列 → 加入已复习
if(wrongQueue.indexOf(spellIdx)<0){if(reviewedQueue.indexOf(spellIdx)<0)reviewedQueue.push(spellIdx);saveQueues();}
}
setTimeout(function(){spellNext();},1500);}else{inp.classList.add("wrong");fb.innerHTML="✗ 拼错了, 应该是 <strong>"+words[spellIdx].word+"</strong><br>你写的: "+(ans||"(空)");fb.className="spell-feedback wrong";spellAnswered=true;speak(words[spellIdx].word);
if(!reviewedMode){
// 加入错词, 从已复习移出
if(wrongQueue.indexOf(spellIdx)<0)wrongQueue.push(spellIdx);var rIdx=reviewedQueue.indexOf(spellIdx);if(rIdx>=0)reviewedQueue.splice(rIdx,1);saveQueues();
}}updateStats();}

function skipSpell(){if(spellAnswered)return;var fb=document.getElementById("sFeedback");fb.innerHTML="答案是 <strong>"+words[spellIdx].word+"</strong>";fb.className="spell-feedback wrong";spellTotal++;spellAnswered=true;document.getElementById("spellInput").disabled=true;
if(!reviewedMode){if(wrongQueue.indexOf(spellIdx)<0)wrongQueue.push(spellIdx);var rIdx=reviewedQueue.indexOf(spellIdx);if(rIdx>=0)reviewedQueue.splice(rIdx,1);saveQueues();}
updateStats();speak(words[spellIdx].word);}

function spellNext(){if(reviewedMode){if(reviewedQueue.length===0){alert("已复习单词练完啦!");exitReviewedMode();return;}var randIdx=Math.floor(Math.random()*reviewedQueue.length);spellIdx=reviewedQueue[randIdx];}else if(reviewMode){if(wrongQueue.length===0){alert("恭喜! 错词全部掌握!");exitReviewMode();return;}var randIdx=Math.floor(Math.random()*wrongQueue.length);spellIdx=wrongQueue[randIdx];}else{spellIdx=(spellIdx+1)%words.length;}loadSpell();}

function enterReviewMode(){if(wrongQueue.length===0){alert("还没有错词哦, 先答错几个再来吧!");return;}reviewMode=true;document.getElementById("spellCard").classList.add("review-mode");document.getElementById("btnReview").style.display="none";document.getElementById("btnExitReview").style.display="block";document.getElementById("btnReviewed").style.display="none";document.getElementById("progressInfo").innerHTML="<strong>错词专项 · 待掌握 "+wrongQueue.length+" 个</strong>";var randIdx=Math.floor(Math.random()*wrongQueue.length);spellIdx=wrongQueue[randIdx];loadSpell();}

function exitReviewMode(){reviewMode=false;document.getElementById("spellCard").classList.remove("review-mode");document.getElementById("btnReview").style.display="block";document.getElementById("btnExitReview").style.display="none";document.getElementById("btnReviewed").style.display="block";document.getElementById("progressInfo").innerHTML='第 <span id="cur">1</span> / <span id="tot">'+words.length+'</span> 个';spellIdx=0;loadSpell();}

function enterReviewedMode(){if(reviewedQueue.length===0){alert("还没有已复习单词哦, 先答对几个再来吧!");return;}reviewedMode=true;document.getElementById("spellCard").classList.add("reviewed-mode");document.getElementById("btnReviewed").style.display="none";document.getElementById("btnExitReviewed").style.display="block";document.getElementById("btnReview").style.display="none";document.getElementById("progressInfo").innerHTML="<strong>已复习专练 · "+reviewedQueue.length+" 个</strong>";var randIdx=Math.floor(Math.random()*reviewedQueue.length);spellIdx=reviewedQueue[randIdx];loadSpell();}

function exitReviewedMode(){reviewedMode=false;document.getElementById("spellCard").classList.remove("reviewed-mode");document.getElementById("btnReviewed").style.display="block";document.getElementById("btnExitReviewed").style.display="none";document.getElementById("btnReview").style.display="block";document.getElementById("progressInfo").innerHTML='第 <span id="cur">1</span> / <span id="tot">'+words.length+'</span> 个';spellIdx=0;loadSpell();}

function switchMode(mode){if(mode==="browse"){document.getElementById("tabBrowse").classList.add("active");document.getElementById("tabSpell").classList.remove("active");document.getElementById("modeBrowse").classList.add("active");document.getElementById("modeSpell").classList.remove("active");}else{document.getElementById("tabBrowse").classList.remove("active");document.getElementById("tabSpell").classList.add("active");document.getElementById("modeBrowse").classList.remove("active");document.getElementById("modeSpell").classList.add("active");loadSpell();}}

function getFavs(){try{return JSON.parse(localStorage.getItem(FAV_KEY))||[];}catch(e){return [];}}
function saveFavs(f){localStorage.setItem(FAV_KEY,JSON.stringify(f));}
function toggleFav(e){e.stopPropagation();var favs=getFavs();var w=words[idx];var i=-1;for(var k=0;k<favs.length;k++){if(favs[k].word===w.word){i=k;break;}}if(i>=0){favs.splice(i,1);}else{favs.push(w);}saveFavs(favs);updateFav();updateCount();}
function updateFav(){var favs=getFavs();var isFav=false;for(var k=0;k<favs.length;k++){if(favs[k].word===words[idx].word){isFav=true;break;}}var b=document.getElementById("favBtn");b.textContent=isFav?"♥":"♡";b.classList.toggle("on",isFav);}
function updateCount(){document.getElementById("favCount").textContent=getFavs().length;}
function showFavs(){var favs=getFavs();var list=document.getElementById("favList");if(favs.length===0){list.innerHTML='<div class="empty-state">还没收藏过单词</div>';}else{var h="";for(var i=0;i<favs.length;i++){var f=favs[i];h+='<li class="fav-item"><div class="fav-word"><strong>'+f.word+'</strong><span>'+f.phonetic+' '+f.meaning+'</span></div><button class="remove-btn" data-word="'+f.word+'">移除</button></li>';}list.innerHTML=h;var btns=list.querySelectorAll(".remove-btn");for(var j=0;j<btns.length;j++){btns[j].addEventListener("click",function(){removeFav(this.getAttribute("data-word"));});}}document.getElementById("modal").classList.add("show");}
function closeFavs(){document.getElementById("modal").classList.remove("show");}
function removeFav(w){var favs=getFavs();var newFavs=[];for(var k=0;k<favs.length;k++){if(favs[k].word!==w)newFavs.push(favs[k]);}saveFavs(newFavs);showFavs();updateFav();updateCount();}

document.getElementById("card").addEventListener("click",flip);
document.getElementById("favBtn").addEventListener("click",toggleFav);
document.getElementById("speakBtn1").addEventListener("click",function(e){e.stopPropagation();speak(words[idx].word);});
document.getElementById("speakBtn2").addEventListener("click",function(e){e.stopPropagation();speak(words[idx].word);});
document.getElementById("btnPrev").addEventListener("click",prev);
document.getElementById("btnNext").addEventListener("click",next);
document.getElementById("btnRandom").addEventListener("click",rand);
document.getElementById("btnViewFav").addEventListener("click",showFavs);
document.getElementById("btnClose").addEventListener("click",closeFavs);
document.getElementById("modal").addEventListener("click",function(e){if(e.target===this)closeFavs();});
document.getElementById("tabBrowse").addEventListener("click",function(){switchMode("browse");});
document.getElementById("tabSpell").addEventListener("click",function(){switchMode("spell");});
document.getElementById("btnSubmit").addEventListener("click",submitSpell);
document.getElementById("btnSkip").addEventListener("click",skipSpell);
document.getElementById("btnSpellNext").addEventListener("click",spellNext);
document.getElementById("btnReview").addEventListener("click",enterReviewMode);
document.getElementById("btnExitReview").addEventListener("click",exitReviewMode);
document.getElementById("btnReviewed").addEventListener("click",enterReviewedMode);
document.getElementById("btnExitReviewed").addEventListener("click",exitReviewedMode);
document.getElementById("spellSpeakBtn").addEventListener("click",function(){speak(words[spellIdx].word);});
document.getElementById("spellInput").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();if(spellAnswered){spellNext();}else{submitSpell();}}});

load();updateCount();updateStats();
</script>
</body>
