<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>句子实验室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC",sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;color:#333;padding:18px 14px 40px}
.wrap{max-width:560px;margin:0 auto}
.header{text-align:center;color:#fff;margin:6px 0 18px}
.header h1{font-size:22px;margin-bottom:4px}
.header .sub{font-size:13px;opacity:.9}
.card{background:#fff;border-radius:18px;padding:20px 18px;margin-bottom:16px;box-shadow:0 8px 24px rgba(0,0,0,.18)}
.card-tag{display:inline-block;font-size:12px;font-weight:700;color:#fff;background:linear-gradient(135deg,#667eea,#764ba2);padding:4px 12px;border-radius:20px;margin-bottom:14px}
.card-tag.t2{background:linear-gradient(135deg,#11998e,#38ef7d)}
.card-tag.t3{background:linear-gradient(135deg,#f7971e,#ffd200);color:#5a4500}
.card-tag.t4{background:linear-gradient(135deg,#fa709a,#fee140);color:#7a2438}
.card-tag.t5{background:linear-gradient(135deg,#4facfe,#00f2fe)}

/* 模块1 词块 */
.chips{display:flex;flex-wrap:wrap;gap:8px;line-height:1.8;font-size:20px;margin-bottom:8px}
.chip{background:#eef1ff;border:2px solid #dfe4ff;color:#3b3f6b;padding:6px 12px;border-radius:12px;cursor:pointer;transition:all .15s;user-select:none}
.chip:hover{transform:translateY(-2px)}
.chip.active{background:#667eea;border-color:#667eea;color:#fff;box-shadow:0 4px 12px rgba(102,126,234,.4)}
.chip-info{margin-top:10px;min-height:48px;background:#f7f8ff;border-radius:12px;padding:12px 14px;font-size:14px;color:#555;display:flex;flex-direction:column;justify-content:center;border:1px dashed #cfd6ff}
.chip-info .role{font-weight:700;color:#667eea;font-size:15px}
.chip-info .role .en{color:#999;font-weight:400;font-size:12px;margin-left:6px}
.chip-info .note{margin-top:4px;color:#666;font-size:13px}
.tip{font-size:12px;color:#aaa;margin-top:6px;text-align:center}

/* 模块2 骨架 */
.skel-main{background:#effaf3;border:2px solid #b8ebcd;border-radius:12px;padding:12px 14px;font-size:17px;font-weight:600;color:#11806a;text-align:center;margin-bottom:14px}
.skel-grid{display:grid;grid-template-columns:auto 1fr;gap:8px 14px;font-size:15px}
.skel-grid .k{color:#11998e;font-weight:700;text-align:right}
.skel-grid .v{color:#444}
.skel-plain{margin-top:14px;border-top:1px dashed #cde;padding-top:12px}
.skel-plain .row{display:flex;justify-content:space-between;font-size:14px;padding:5px 0;color:#555}
.skel-plain .row b{color:#11806a}

/* 模块3 时态时间线 */
.tense-name{font-size:17px;font-weight:700;color:#c77800;margin-bottom:4px}
.tense-formula{display:inline-block;background:#fff7e0;border:1px solid #ffe08a;color:#9a6b00;font-family:ui-monospace,Menlo,monospace;font-size:14px;padding:4px 10px;border-radius:8px;margin-bottom:16px}
.timeline{display:flex;align-items:stretch;gap:0;margin:10px 0 16px;position:relative}
.tl-node{flex:1;text-align:center;position:relative;padding-top:26px}
.tl-node:before{content:"";position:absolute;top:8px;left:0;right:0;height:3px;background:#ffd86b}
.tl-node:first-child:before{left:50%}
.tl-node:last-child:before{right:50%}
.tl-dot{position:absolute;top:2px;left:50%;transform:translateX(-50%);width:15px;height:15px;border-radius:50%;background:#f7971e;border:3px solid #fff;box-shadow:0 0 0 2px #ffd86b}
.tl-node.now .tl-dot{background:#e53935;box-shadow:0 0 0 2px #ffb3b0;width:18px;height:18px;top:0}
.tl-time{font-size:12px;color:#b07d12;font-weight:700}
.tl-text{font-size:13px;color:#555;margin-top:3px;padding:0 4px}
.contrast{background:#fffaf0;border-radius:10px;padding:10px 12px}
.contrast .c-item{font-size:13px;color:#7a5a00;padding:4px 0;display:flex;gap:6px}
.contrast .c-item:before{content:"✗";color:#e08a00;font-weight:700}

/* 模块4 错句 */
.err{border:1px solid #ffd2dd;border-radius:12px;margin-bottom:10px;overflow:hidden}
.err-head{padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:14px;background:#fff5f8}
.err-head .x{color:#e84a6f;font-weight:700;flex-shrink:0}
.err-head .s{color:#933;flex:1}
.err-head .arrow{color:#e84a6f;transition:transform .2s}
.err.open .err-head .arrow{transform:rotate(90deg)}
.err-body{display:none;padding:0 13px 12px;font-size:13px;color:#555}
.err.open .err-body{display:block}
.err-body .line{padding:4px 0}
.err-body .line b{color:#e84a6f}
.err-body .correct{margin-top:6px;background:#effaf3;border-radius:8px;padding:8px 10px;color:#11806a;font-weight:600}

/* 模块5 练习 */
.pr{border:1px solid #d6ecff;border-radius:12px;padding:13px;margin-bottom:12px}
.pr-q{font-size:16px;color:#234;margin-bottom:10px;line-height:1.5}
.pr-row{display:flex;gap:8px}
.pr-input{flex:1;padding:10px 12px;font-size:15px;border:2px solid #d6ecff;border-radius:10px;outline:none}
.pr-input:focus{border-color:#4facfe}
.pr-input.ok{border-color:#38ef7d;background:#effaf3}
.pr-input.no{border-color:#ff6b8a;background:#fff5f8}
.pr-btn{padding:10px 16px;border:none;border-radius:10px;background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;font-weight:700;cursor:pointer;font-size:14px}
.pr-fb{margin-top:9px;font-size:13px;min-height:18px}
.pr-fb.ok{color:#11998e}
.pr-fb.no{color:#e84a6f}
.pr-fb .ans{font-weight:700}
.footer{text-align:center;color:rgba(255,255,255,.75);font-size:12px;margin-top:8px}
.navlink{display:inline-block;color:#fff;text-decoration:none;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.5);border-radius:20px;padding:6px 14px;font-size:13px;margin:0 3px}
.speak-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:22px;padding:9px 22px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(102,126,234,.35)}
.speak-btn:active{transform:scale(.96)}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
<h1>🔬 句子实验室</h1>
<div class="sub">点一点，把一句话拆透</div>
</div>
<div style="text-align:center;margin-bottom:14px">
<a class="navlink" href="./">🔬 全部句子</a>
<a class="navlink" href="../errors/">📕 错题本</a>
<a class="navlink" href="../">📖 单词打卡</a>
</div>
<div id="app"></div>
<div class="footer">喵老师 AI 家教 · 语法拆解</div>
</div>

<script>
/* ===== 句子数据（英语喵分析后产出，填入这一个对象即可生成任意句子）===== */
var sentence={
  "text": "What is your father doing in the kitchen?",
  "chunks": [
    {
      "text": "What",
      "role": "疑问词",
      "en": "Question Word",
      "note": "什么，对做的事提问"
    },
    {
      "text": "is",
      "role": "be 动词",
      "en": "Auxiliary Verb",
      "note": "现在进行时的助动词，与主语 your father 搭配"
    },
    {
      "text": "your father",
      "role": "主语",
      "en": "Subject",
      "note": "你的爸爸，第三人称单数"
    },
    {
      "text": "doing",
      "role": "现在分词",
      "en": "Present Participle",
      "note": "正在做，现在进行时的 V-ing 形式"
    },
    {
      "text": "in the kitchen",
      "role": "地点状语",
      "en": "Place Adverbial",
      "note": "在厨房里"
    }
  ],
  "skeleton": {
    "main": "What is your father doing?",
    "parts": [
      {
        "k": "Question Word 疑问词",
        "v": "What（什么）"
      },
      {
        "k": "Auxiliary Verb 助动词",
        "v": "is"
      },
      {
        "k": "Subject 主语",
        "v": "your father（你的爸爸）"
      },
      {
        "k": "Main Verb 主要动词",
        "v": "doing（正在做）"
      },
      {
        "k": "Place 地点",
        "v": "in the kitchen（在厨房里）"
      }
    ],
    "plain": [
      {
        "q": "问什么？",
        "a": "What（正在做什么事）"
      },
      {
        "q": "谁？",
        "a": "your father（你爸爸）"
      },
      {
        "q": "在哪里？",
        "a": "in the kitchen（在厨房里）"
      }
    ]
  },
  "tense": {
    "name": "现在进行时特殊疑问句（Present Continuous Wh-Question）",
    "formula": "What + is/are + 主语 + doing + 地点/时间？",
    "timeline": [
      {
        "time": "现在",
        "text": "Father is washing dishes in the kitchen. ← 正在做",
        "now": true
      }
    ],
    "contrast": [
      "现在进行时特殊疑问句结构：What + be + 主语 + V-ing？",
      "What does your father do? → 问职业（一般现在时）",
      "What is your father doing? → 问正在做什么（现在进行时）",
      "千万不能说：What does your father doing？→ does 和 doing 不能一起用！"
    ]
  },
  "errors": [
    {
      "wrong": "What does your father doing in the kitchen?",
      "type": "助动词混乱",
      "why": "does + doing 不能一起用！does 是一般现在时的助动词，doing 是现在进行时的 V-ing。问\"正在做什么\"要用 is + doing。",
      "correct": "What is your father doing in the kitchen?"
    },
    {
      "wrong": "What your father is doing in the kitchen?",
      "type": "疑问句语序错误",
      "why": "特殊疑问句的语序是：What + is + 主语 + doing？be 动词要提到主语前面",
      "correct": "What is your father doing in the kitchen?"
    },
    {
      "wrong": "What is your father do in the kitchen?",
      "type": "动词形式错误",
      "why": "现在进行时用 is + V-ing，不是 is + 动词原形",
      "correct": "What is your father doing in the kitchen?"
    }
  ],
  "practice": [
    {
      "q": "What ___ your mother ___ (do) in the living room?",
      "answer": "is / doing",
      "hint": "现在进行时特殊疑问句"
    },
    {
      "q": "What ___ the children ___ (do) in the park?",
      "answer": "are / doing",
      "hint": "children 是复数，用 are"
    },
    {
      "q": "What ___ (be) you ___ (do) now?",
      "answer": "are / doing",
      "hint": "you 用 are + doing"
    }
  ]
};

/* ===== 渲染 ===== */
function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}

var _gvoice=null;
function _pickVoice(){var vs=[];try{vs=speechSynthesis.getVoices()||[];}catch(e){}var pref=['Sonia','Daniel','Kate','Serena','Arthur','Google UK English Female','Google UK English Male'];for(var p=0;p<pref.length;p++)for(var i=0;i<vs.length;i++)if(vs[i].name&&vs[i].name.indexOf(pref[p])>=0)return vs[i];for(var i=0;i<vs.length;i++)if(vs[i].lang&&vs[i].lang.replace('_','-').indexOf('en-GB')>=0)return vs[i];for(var i=0;i<vs.length;i++)if(vs[i].lang&&vs[i].lang.indexOf('en')>=0)return vs[i];return null;}
try{if(typeof speechSynthesis!=='undefined'){_gvoice=_pickVoice();speechSynthesis.onvoiceschanged=function(){_gvoice=_pickVoice();};}}catch(e){}
function speak(text,rate){try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(text);if(!_gvoice)_gvoice=_pickVoice();if(_gvoice)u.voice=_gvoice;u.lang=(_gvoice&&_gvoice.lang)?_gvoice.lang:'en-GB';u.rate=rate||0.95;u.pitch=1;setTimeout(function(){try{speechSynthesis.resume();speechSynthesis.speak(u);}catch(e){}},60);}catch(e){}}

function renderChunks(s){
  var c=el("div","card");
  c.appendChild(el("div","card-tag","① 句子原文 · 点词看成分"));
  var chips=el("div","chips");
  var info=el("div","chip-info","👆 点上面任意一块，看它在句子里是什么成分");
  for(var i=0;i<s.chunks.length;i++){(function(ch){
    var chip=el("span","chip",ch.text);
    chip.addEventListener("click",function(){
      var all=chips.querySelectorAll(".chip");
      for(var k=0;k<all.length;k++)all[k].classList.remove("active");
      chip.classList.add("active");
      info.innerHTML='<div class="role">'+ch.role+'<span class="en">'+ch.en+'</span></div><div class="note">'+ch.note+'</div>';
      speak(ch.text);
    });
    chips.appendChild(chip);
  })(s.chunks[i]);}
  c.appendChild(chips);
  c.appendChild(info);
  c.appendChild(el("div","tip","拆开看，每个词都有它的位置"));
  return c;
}

function renderSkeleton(s){
  var sk=s.skeleton;var c=el("div","card");
  c.appendChild(el("div","card-tag t2","② 句子骨架 · 抓主干"));
  c.appendChild(el("div","skel-main",sk.main));
  var grid=el("div","skel-grid");
  for(var i=0;i<sk.parts.length;i++){
    grid.appendChild(el("div","k",sk.parts[i].k));
    grid.appendChild(el("div","v",sk.parts[i].v));
  }
  c.appendChild(grid);
  var plain=el("div","skel-plain");
  for(var j=0;j<sk.plain.length;j++){
    plain.appendChild(el("div","row",'<span>'+sk.plain[j].q+'</span><b>'+sk.plain[j].a+'</b>'));
  }
  c.appendChild(plain);
  return c;
}

function renderTense(s){
  var t=s.tense;var c=el("div","card");
  c.appendChild(el("div","card-tag t3","③ 时态时间线 · 感受时间"));
  c.appendChild(el("div","tense-name",t.name));
  c.appendChild(el("div","tense-formula",t.formula));
  var tl=el("div","timeline");
  for(var i=0;i<t.timeline.length;i++){
    var n=t.timeline[i];
    var node=el("div","tl-node"+(n.now?" now":""));
    node.appendChild(el("div","tl-dot"));
    node.appendChild(el("div","tl-time",n.time));
    node.appendChild(el("div","tl-text",n.text));
    tl.appendChild(node);
  }
  c.appendChild(tl);
  var con=el("div","contrast");
  for(var j=0;j<t.contrast.length;j++)con.appendChild(el("div","c-item",t.contrast[j]));
  c.appendChild(con);
  return c;
}

function renderErrors(s){
  var c=el("div","card");
  c.appendChild(el("div","card-tag t4","④ 错句诊断 · 知道为什么错"));
  for(var i=0;i<s.errors.length;i++){(function(e){
    var box=el("div","err");
    var head=el("div","err-head",'<span class="x">✗</span><span class="s">'+e.wrong+'</span><span class="arrow">›</span>');
    var body=el("div","err-body",
      '<div class="line"><b>错误类型：</b>'+e.type+'</div>'+
      '<div class="line"><b>为什么错：</b>'+e.why+'</div>'+
      '<div class="correct">✓ '+e.correct+'</div>');
    head.addEventListener("click",function(){box.classList.toggle("open");});
    box.appendChild(head);box.appendChild(body);
    c.appendChild(box);
  })(s.errors[i]);}
  return c;
}

function renderPractice(s){
  var c=el("div","card");
  c.appendChild(el("div","card-tag t5","⑤ 即时练习 · 自己动手"));
  for(var i=0;i<s.practice.length;i++){(function(p){
    var box=el("div","pr");
    box.appendChild(el("div","pr-q",p.q));
    var row=el("div","pr-row");
    var inp=el("input","pr-input");inp.type="text";inp.placeholder="填空...";inp.setAttribute("autocomplete","off");
    var btn=el("button","pr-btn","检查");
    row.appendChild(inp);row.appendChild(btn);
    box.appendChild(row);
    var fb=el("div","pr-fb","");
    box.appendChild(fb);
    function check(){
      var val=inp.value.trim().toLowerCase().replace(/\s+/g," ");
      var answers=p.answer.toLowerCase().split("/");
      var ok=false;
      for(var k=0;k<answers.length;k++){if(val===answers[k].trim()){ok=true;break;}}
      inp.classList.remove("ok","no");fb.className="pr-fb";
      if(ok){inp.classList.add("ok");fb.classList.add("ok");fb.innerHTML="✓ 答对了！";}
      else{inp.classList.add("no");fb.classList.add("no");fb.innerHTML='✗ 再想想。正确答案：<span class="ans">'+p.answer+'</span><br>💡 '+p.hint;}
    }
    btn.addEventListener("click",check);
    inp.addEventListener("keydown",function(ev){if(ev.key==="Enter"){ev.preventDefault();check();}});
    c.appendChild(box);
  })(s.practice[i]);}
  return c;
}

function render(){
  var app=document.getElementById("app");app.innerHTML="";
  var oc=el("div","card");oc.style.textAlign="center";
  oc.appendChild(el("div",null,'<div style="font-size:13px;color:#999">原句</div><div style="font-size:19px;font-weight:700;color:#445;margin:6px 0 12px;line-height:1.5">'+sentence.text+'</div>'));
  var sb=el("button","speak-btn","🔊 朗读整句");
  sb.addEventListener("click",function(){speak(sentence.text);});
  oc.appendChild(sb);
  app.appendChild(oc);
  app.appendChild(renderChunks(sentence));
  app.appendChild(renderSkeleton(sentence));
  app.appendChild(renderTense(sentence));
  app.appendChild(renderErrors(sentence));
  app.appendChild(renderPractice(sentence));
}
render();
</script>
</body>
</html>
